# GRC 平台 · 本地开发依赖栈（PostgreSQL16+pgvector / Redis / MinIO）
# 启动：docker compose -f deploy/docker-compose.yml up -d
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: grc-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grc
    ports:
      - "5432:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro   # 首启创建 grc_app 角色
      - grc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d grc"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: grc-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: grc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - grc-miniodata:/data

volumes:
  grc-pgdata:
  grc-miniodata:

# CI 流水线：每次 push / PR 自动构建并跑测试，红则不合并。
# 落实 D2-5 §四「测试跑绿才提交」。后端用 Testcontainers 起真实 PG 跑隔离等红线用例
# （GitHub 托管 Runner 内置 Docker，Testcontainers 可用）。
# 前端 CI 将随 frontend/ 工程创建时补充。
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: 后端构建与测试（mvn verify）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 JDK 17 (Temurin，发行版无关)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: 构建并测试（含 Testcontainers 隔离红线用例）
        working-directory: backend
        run: mvn -B verify

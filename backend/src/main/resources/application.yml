server:
  port: 8080

spring:
  application:
    name: grc-platform

  # 运行期以【非 owner / NOBYPASSRLS 角色 grc_app】连接 → RLS 对其强制生效
  datasource:
    url: jdbc:postgresql://localhost:5432/grc
    username: grc_app
    password: grc_app_pw

  jpa:
    hibernate:
      ddl-auto: none          # 由 Flyway 管理 schema，禁用 Hibernate 自动建表
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 迁移以 owner/超级用户执行（owner 不受 RLS，可建表/灌种子）
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/grc
    user: postgres
    password: postgres
    locations: classpath:db/migration

# Flowable 工作流引擎（Phase A 横向审批能力）
flowable:
  # 引擎在启动时以 grc_app 连接自建/升级 ACT_* 引擎表（需 V10 已授予 grc_app CREATE 权）。
  database-schema-update: "true"
  # 审批以「用户任务」为主，暂不需要异步作业/定时器后台线程；关闭异步执行器，
  # 既简化运行模型，也避免测试中后台线程干扰（与 grc.scheduler 测试关停同理）。
  async-executor-activate: false
  # 不启用 Flowable 自带 IDM 身份引擎——平台身份/权限由 M8 RBAC 统一管理，避免双源。
  idm:
    enabled: false

# 调度/到期扫描内核
grc:
  scheduler:
    enabled: true            # 测试中置 false，避免定时任务干扰
    fixed-delay-ms: 900000   # 扫描间隔，默认 15 分钟

  # AI 接入（CR-004 · RAG）。默认全本地离线，不出网、不需密钥；生产按需切换。
  ai:
    # 生成端 LLM 提供方：local（本地离线·不编造，默认）| claude（Anthropic 云）
    provider: ${GRC_AI_PROVIDER:local}
    claude:
      # 密钥仅经环境变量注入，代码/配置文件不含明文密钥
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${GRC_AI_CLAUDE_MODEL:claude-opus-4-8}
      base-url: ${GRC_AI_CLAUDE_BASE_URL:https://api.anthropic.com}
      max-tokens: 1024
    # 嵌入提供方：local（本地确定性·默认）| voyage（待接入）。维度须与 kb_chunk.embedding=vector(1024) 一致
    embedding:
      provider: ${GRC_AI_EMBEDDING_PROVIDER:local}

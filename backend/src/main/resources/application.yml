server:
  port: 8080

spring:
  application:
    name: grc-platform

  # 运行期以【非 owner / NOBYPASSRLS 角色 grc_app】连接 → RLS 对其强制生效
  datasource:
    url: jdbc:postgresql://localhost:5432/grc
    username: grc_app
    password: grc_app_pw

  jpa:
    hibernate:
      ddl-auto: none          # 由 Flyway 管理 schema，禁用 Hibernate 自动建表
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 迁移以 owner/超级用户执行（owner 不受 RLS，可建表/灌种子）
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/grc
    user: postgres
    password: postgres
    locations: classpath:db/migration

# 调度/到期扫描内核
grc:
  scheduler:
    enabled: true            # 测试中置 false，避免定时任务干扰
    fixed-delay-ms: 900000   # 扫描间隔，默认 15 分钟

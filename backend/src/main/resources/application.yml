server:
  port: 8080

spring:
  application:
    name: grc-platform

  # 运行期以【非 owner / NOBYPASSRLS 角色 grc_app】连接 → RLS 对其强制生效
  # 安全加固包 A19：凭证一律可被环境变量覆盖（与 GRC_JWT_SECRET 同范式），默认值仅供本地开发
  datasource:
    url: ${GRC_DB_URL:jdbc:postgresql://localhost:5432/grc}
    username: ${GRC_DB_USER:grc_app}
    password: ${GRC_DB_PASSWORD:grc_app_pw}

  jpa:
    hibernate:
      ddl-auto: none          # 由 Flyway 管理 schema，禁用 Hibernate 自动建表
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 迁移以 owner/超级用户执行（owner 不受 RLS，可建表/灌种子）
  flyway:
    enabled: true
    url: ${GRC_FLYWAY_URL:jdbc:postgresql://localhost:5432/grc}
    user: ${GRC_FLYWAY_USER:postgres}
    password: ${GRC_FLYWAY_PASSWORD:postgres}
    locations: classpath:db/migration

# Flowable 工作流引擎（Phase A 横向审批能力）
flowable:
  # 引擎在启动时以 grc_app 连接自建/升级 ACT_* 引擎表（需 V10 已授予 grc_app CREATE 权）。
  database-schema-update: "true"
  # 审批以「用户任务」为主，暂不需要异步作业/定时器后台线程；关闭异步执行器，
  # 既简化运行模型，也避免测试中后台线程干扰（与 grc.scheduler 测试关停同理）。
  async-executor-activate: false
  # 不启用 Flowable 自带 IDM 身份引擎——平台身份/权限由 M8 RBAC 统一管理，避免双源。
  idm:
    enabled: false

# 调度/到期扫描内核
grc:
  scheduler:
    enabled: true            # 测试中置 false，避免定时任务干扰
    fixed-delay-ms: 900000   # 扫描间隔，默认 15 分钟

  # 认证（增强③ R1 / 安全评审 H-9）。JWT 密钥仅环境注入，代码/配置不含默认密钥；
  # 未配置 GRC_JWT_SECRET 时留空 → JwtService 启动 fail-fast（拒绝以可预测密钥签发令牌）。
  auth:
    jwt:
      secret: ${GRC_JWT_SECRET:}
      ttl-hours: 12

  # AI 接入（CR-004 · RAG）。默认全本地离线，不出网、不需密钥；生产按需切换。
  ai:
    # 生成端 LLM 提供方：
    #   local（本地离线·不编造，默认）
    #   claude（Anthropic 云）
    #   openai（OpenAI-兼容：OpenAI/通义千问/DeepSeek/Kimi/智谱，及本地 vLLM/Ollama/Xinference 等，填 base-url+key+model）
    provider: ${GRC_AI_PROVIDER:local}
    claude:
      # 密钥仅经环境变量注入，代码/配置文件不含明文密钥
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${GRC_AI_CLAUDE_MODEL:claude-opus-4-8}
      base-url: ${GRC_AI_CLAUDE_BASE_URL:https://api.anthropic.com}
      max-tokens: 1024
    # 通用 OpenAI-兼容端点（base-url 指向到 /v1）。本地私有化模型可满足数据不出境
    openai:
      api-key: ${GRC_AI_OPENAI_API_KEY:}
      base-url: ${GRC_AI_OPENAI_BASE_URL:https://api.openai.com/v1}
      model: ${GRC_AI_OPENAI_MODEL:gpt-4o-mini}
      max-tokens: 1024
    # 嵌入提供方：local（本地确定性·默认）| voyage（待接入）。维度须与 kb_chunk.embedding=vector(1024) 一致
    embedding:
      provider: ${GRC_AI_EMBEDDING_PROVIDER:local}

# ---------- 八轮 8-5（B10）：运维健康端点 ----------
# /actuator/health 供部署脚本/compose healthcheck 判活；metrics 供 AI 调用量/时延观测起步。
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

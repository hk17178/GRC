# =============================================================
# 测试专用配置（additive：仅覆盖 application.yml 的同名键，其余仍取 yml）
# 目的：让「生产安全默认 / fail-fast」改动不影响测试套件——
#   1) 提供测试用 JWT / 配置主密钥（生产为 fail-fast 必配项，测试统一在此供给）；
#   2) 打开 X-User 头回退（HTTP 层测试 AuthTest/RbacEnforcementTest/RiskCloseGateWebTest 依赖它免登录冒烟）。
# 这些值仅用于测试，绝不可用于生产。
# =============================================================
grc.auth.header-fallback.enabled=true
grc.auth.jwt.secret=test-only-jwt-secret-do-not-use-in-prod-0123456789
grc.config.secret=test-only-config-secret-do-not-use-in-prod
grc.hashchain.secret=test-only-hashchain-secret-do-not-use-in-prod
